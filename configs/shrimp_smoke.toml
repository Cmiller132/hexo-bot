# CPU smoke profile — mini version of shrimp_main_7.
#
# Same Gumbel-AlphaZero search profile as configs/shrimp_main_7.toml, shrunk
# to run a full selfplay -> train -> checkpoint epoch on CPU in a couple of
# minutes. Use it to prove the pipeline end-to-end after a fresh build; it is
# NOT a strength run (the budgets are far too small to learn anything).
#
# ARCHITECTURE COMES FROM ENV (read once at import in shrimp/constants.py), not
# this file. With nothing exported the net is the c=96 / heads=4 / trunk
# "CCCACCCACCA" default. For a faster, genuinely tiny smoke net export a small
# arch before launching (any C.../.A layout ending in 'A' works):
#   SHRIMP_CHANNELS=32 SHRIMP_ATTENTION_HEADS=4 SHRIMP_TRUNK=CCA \
#   SHRIMP_SUPPORT_RADIUS=4
# Channels must be divisible by heads. A checkpoint only loads into a net built
# with the same values, so keep them consistent across a smoke run's launches.
#
# GUMBEL profile: this is a Gumbel run (gumbel_root / sequential_halving /
# nonroot_select / target all on, budgets scaled down from main_7). Gumbel-Top-m
# root sampling + Sequential Halving are the root exploration mechanism —
# replacing the classic-PUCT Dirichlet root noise / forced playouts, which no
# longer exist in the config.

[model]
name = "shrimp"
module = "shrimp.plugin"

[model.config]
device = "cpu"

[model.config.selfplay]
search_visits = 32
pcr_full_proportion = 0.6
pcr_fast_visits = 8
active_games = 4
virtual_batch_size = 4
flush_target = 16
active_root_limit = 8
max_game_plies = 120
policy_init_fraction = 0.25

# Gumbel-AlphaZero search, budgets scaled down from main_7 (m 32 -> 8 like the
# proven CPU shape in tests/test_shrimp_gumbel_smoke.py). Under sequential
# halving the tree budget-calibrates gumbel_m down the halving ladder for the
# small visit budget, so 8 candidates fit the 32-visit root.
gumbel_root_enabled = true
gumbel_sequential_halving = true
gumbel_nonroot_select = true
gumbel_target_enabled = true
gumbel_c_visit = 50.0
gumbel_c_scale = 1.0
gumbel_m = 8
gumbel_target_min_visits = 1
gumbel_play_prune = true
export_root_prior_logits = true

[model.config.training]
batch_rows = 16
shuffle_keep_target_rows = 8192
# Train against the Gumbel improved-policy target (matches main_7); a row with no
# gumbel target falls back to the visit-count policy.
policy_target = "gumbel"
expand_backend = "serial"

[model.config.evaluation]
games_per_epoch = 0

[run]
name = "shrimp_smoke"
# Relative output_dir resolves against THIS config file's dir (configs/), so
# "../runs/..." anchors the run tree at the repo-root runs/ directory.
output_dir = "../runs/shrimp_smoke"
seed = 1

[loop]
epochs = 1

[selfplay]
games_per_epoch = 4
update_checkpoint_pointer = false

[train]
passes_per_epoch = 1

[checkpoint]
# Optional warm start; left off so the smoke run trains from a random net.
# initialize_from = "runs/shrimp_bc_1/checkpoint_epoch1.pt"
save_name = "latest"
