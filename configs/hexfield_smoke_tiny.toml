# CPU smoke profile (tiny) — smallest mini version of hexfield_main_7.
#
# The fastest end-to-end gate: same Gumbel-AlphaZero search profile as
# configs/hexfield_main_7.toml, budgets cut to the bone so a full selfplay ->
# train -> checkpoint epoch finishes on CPU in well under a minute. Use it as the
# quick "does the build work at all" check. NOT a strength run.
#
# ARCHITECTURE COMES FROM ENV (read once at import in hexfield/constants.py), not
# this file. With nothing exported the net is the c=96 / heads=4 / trunk
# "CCCACCCACCA" default. For the smallest/fastest smoke net export a tiny arch
# before launching (any C.../.A layout ending in 'A' works):
#   HEXFIELD_CHANNELS=32 HEXFIELD_ATTENTION_HEADS=4 HEXFIELD_TRUNK=CCA \
#   HEXFIELD_SUPPORT_RADIUS=4
# Channels must be divisible by heads. A checkpoint only loads into a net built
# with the same values, so keep them consistent across a smoke run's launches.
#
# GUMBEL profile: this is a Gumbel run (gumbel_root / sequential_halving /
# nonroot_select / target all on, budgets scaled down from main_7). Gumbel-Top-m
# root sampling + Sequential Halving are the root exploration mechanism —
# replacing the classic-PUCT Dirichlet root noise / forced playouts, which no
# longer exist in the config.

[model]
name = "hexfield"
module = "hexfield.plugin"

[model.config]
device = "cpu"

[model.config.selfplay]
search_visits = 12
pcr_full_proportion = 0.6
pcr_fast_visits = 4
active_games = 2
virtual_batch_size = 2
flush_target = 6
active_root_limit = 4
max_game_plies = 16
policy_init_fraction = 0.0

# Gumbel-AlphaZero search, budgets cut down from main_7. gumbel_m 4 fits the
# 12-visit root under sequential halving (the tree budget-calibrates m down the
# halving ladder for tiny budgets; see tests/test_hexfield_gumbel_smoke.py).
gumbel_root_enabled = true
gumbel_sequential_halving = true
gumbel_nonroot_select = true
gumbel_target_enabled = true
gumbel_c_visit = 50.0
gumbel_c_scale = 1.0
gumbel_m = 4
gumbel_target_min_visits = 1
gumbel_play_prune = true
export_root_prior_logits = true

[model.config.training]
batch_rows = 8
shuffle_keep_target_rows = 2048
# Train against the Gumbel improved-policy target (matches main_7); a row with no
# gumbel target falls back to the visit-count policy.
policy_target = "gumbel"
expand_backend = "serial"

[model.config.evaluation]
games_per_epoch = 0

[run]
name = "hexfield_smoke_tiny"
# Relative output_dir resolves against THIS config file's dir (configs/), so
# "../runs/..." anchors the run tree at the repo-root runs/ directory.
output_dir = "../runs/hexfield_smoke_tiny"
seed = 1

[loop]
epochs = 1

[selfplay]
games_per_epoch = 2
update_checkpoint_pointer = false

[train]
passes_per_epoch = 1

[checkpoint]
save_name = "latest"
