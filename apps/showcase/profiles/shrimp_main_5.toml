# shrimp_main_5 as-trained search profile (PUCT era, 1024 selfplay visits).
#
# Distilled from the run's training config: the [model.config.selfplay] values
# as trained, restricted to the knobs this repo's SelfplayConfig parser knows
# (the parser is strict; unknown keys raise). The training config additionally
# set root Dirichlet noise, forced playouts, root_fpu_zero_under_noise,
# visit_scaled_c_puct (with c_scale = 0.0, which zeroes the dynamic c_puct
# term), dirichlet_shaped, and pruned_dynamic_cpuct; all of these are inert
# under eval/serve conditions because the eval path plays without root noise
# and never threads the noise or forced-playout knobs into search, so this
# knob set reproduces the training repo's eval-arena search for this run
# exactly. The Gumbel flags are absent and default off, selecting the plain
# PUCT root this run trained with.

[model.config.selfplay]
search_visits = 1024
c_puct = 1.5
active_root_limit = 192
fpu_reduction = 0.2
root_fpu_reduction = 0.2
lcb_z = 1.6
nucleus_f64 = true
new_child_fpu = true
lazy_widening = false
clean_root_prior_cache = true
widening_policy_mass = 0.95
widening_max_children = 96
widening_min_children = 2
policy_init_fraction = 0.25
policy_init_avg_plies = 4.0
policy_init_max_plies = 8
policy_init_temperature = 1.4
temperature = 1.0
temperature_floor = 0.15
temperature_halflife_plies = 45.0
root_policy_temperature = 1.1
root_policy_temperature_early = 1.15
root_policy_temperature_halflife = 19.0
ml_two_sided = false
ml_final_pick_band = 0.08
max_game_plies = 256
tss_enabled = true
cache_max_states = 262144

# Eval-arena protocol knobs. The training config's multi_stage_eval section
# left opening_plies/opening_temperature at their 8 / 1.0 defaults; they are
# written out here so the protocol is explicit.
[model.config.multi_stage_eval]
eval_virtual_batch_size = 32
opening_plies = 8
opening_temperature = 1.0
