# Showcase bot catalogue. Mounted at runtime (SHOWCASE_BOTS_TOML), never baked
# into the image. `checkpoint` paths resolve relative to this file.
#
# A playable bot is a (checkpoint, sims) combination: the client picks one
# checkpoint from the catalogue below and one search budget from the global
# allowed set. Omitting `sims` defaults to [16, 64, 256, 512].
sims = [16, 64, 256, 512]

# Schema per [[checkpoint]]:
#   id         stable slug; games reference it (DB identity with weights sha)
#   checkpoint hexfield .pt with a "model" state dict (inference export or
#              full checkpoint)
#   label      shown in the checkpoint picker
#   run        training run name (bots table identity)
#   epoch      training epoch of the checkpoint (bots table identity)
# Any extra scalar keys (e.g. games_trained) are served verbatim by
# GET /api/bots as display metadata.
#
# All checkpoints must share the support radius the server runs at
# (HEXFIELD_SUPPORT_RADIUS=4 for main_7 weights); width/heads/trunk are
# inferred per checkpoint from its state dict.

# Default entry: the smoke-size test checkpoint. Generated by the test suite —
# run `python -m pytest apps/showcase/tests -q` once to materialize it (see
# apps/showcase/README.md). Weights are random; it plays legal, weak moves,
# which is exactly what local development wants.
#
# NOTE: this tiny net's CCA trunk is not inferable from its state dict (only
# the known production layouts are), so serving it needs the smoke arch env:
#   HEXFIELD_CHANNELS=32 HEXFIELD_ATTENTION_HEADS=4 HEXFIELD_TRUNK=CCA
# Real main_7 checkpoints below need no arch env (inferred per checkpoint).
[[checkpoint]]
id = "tiny"
checkpoint = "tests/data/tiny_bot.pt"
label = "Tiny test bot (random weights)"
run = "showcase_tiny_test"
epoch = 0

# Real catalogue entries point at inference exports of main_7 weights, e.g.
# the shipped model. The sims set above scales strength per game.
