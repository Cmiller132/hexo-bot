# games_trained = 24000000

# Legacy PUCT-era checkpoints ride the same catalogue with their as-trained
# search profile; `group` sections them in the picker and `search = "puct"`
# tags them.
# [[checkpoint]]
# id = "main5-ep105"
# checkpoint = "../../models/shrimp_main5_infer.pt"
# label = "Shrimp main_5"
# run = "shrimp_main_5"
# epoch = 105
# search_profile = "shrimp_main_5"
# group = "earlier runs"
# search = "puct"

# hexfield_eq checkpoints use the same catalogue/search-budget surface. Their
# import-frozen HEXFIELD_EQ_* architecture is derived from checkpoint `meta`
# before the model package is imported; no arch environment is needed here.
# [[checkpoint]]
# id = "hexfield-main2-ep70"
