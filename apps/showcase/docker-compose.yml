# Hexo showcase stack: the game server + a Cloudflare tunnel in front of it.
#
# Run from this directory (apps/showcase/). Needs a `.env` next to this file
# (copy .env.example) and checkpoints in ./deploy/models/ — see
# deploy/README.md for the full first-run walkthrough.
#
# The app is NOT published to the host: cloudflared reaches it as
# `http://app:8000` on the compose network and all public traffic rides the
# tunnel. Uncomment the ports block below for local testing only.

name: hexo-showcase

services:
  app:
    build:
      # Repo root — the wheel builds need the workspace Cargo.toml and
      # packages/; see the header of apps/showcase/Dockerfile.
      context: ../..
      dockerfile: apps/showcase/Dockerfile
    restart: unless-stopped
    environment:
      # --- storage / catalogue (names from server/showcase/config.py) ------
      SHOWCASE_DB_PATH: /data/showcase.db
      SHOWCASE_BOTS_TOML: /models/bots.toml
      # --- capacity ---------------------------------------------------------
      SHOWCASE_WORKERS: "4"
      # --- privacy: stable salt for hashed client IPs (per-IP caps survive
      # restarts). Required, from .env — never committed.
      SHOWCASE_IP_SALT: ${SHOWCASE_IP_SALT:?put SHOWCASE_IP_SALT in apps/showcase/.env}
      # --- model geometry: must match the MOUNTED weights -------------------
      # Support radius is read once at hexfield import time; main_7 weights
      # were trained at radius 4.
      HEXFIELD_SUPPORT_RADIUS: "4"
      # Arch fallback documenting the main_7 recipe (c=192, 3 heads of 64,
      # CCA x5 trunk). Production checkpoints self-describe — width/heads/
      # trunk are inferred per checkpoint from its state dict and inference
      # wins over these — but non-inferable layouts (e.g. the tiny smoke net)
      # fall back to this env, and it documents what the mounted weights are.
      HEXFIELD_CHANNELS: "192"
      HEXFIELD_ATTENTION_HEADS: "3"
      HEXFIELD_TRUNK: "CCACCACCACCACCA"
    volumes:
      - showcase-db:/data # SQLite lives here
      - ./deploy/models:/models:ro # bots.toml + ladder checkpoints
    # Hardening: non-root image, read-only rootfs (only /data, /tmp and
    # /dev/shm are writable), no capabilities, resource caps so a runaway
    # search can't starve the host.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    cpus: 7
    mem_limit: 6g
    # GPU (Intel XPU) deployment: do NOT uncomment here — layer the override
    # file instead, which swaps in Dockerfile.xpu and adds the device
    # passthrough + render-group gid (kept out of this file so the CPU
    # deployment never requires /dev/dri):
    #   docker compose -f docker-compose.yml -f docker-compose.xpu.yml up -d --build
    # devices: ["/dev/dri:/dev/dri"]        # what the override adds
    # group_add: ["${RENDER_GID}"]          # stat -c %g /dev/dri/renderD128
    # Local testing ONLY (the tunnel needs no published port):
    # ports:
    #   - "127.0.0.1:8000:8000"

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?put TUNNEL_TOKEN in apps/showcase/.env}
    depends_on:
      - app

volumes:
  showcase-db:
