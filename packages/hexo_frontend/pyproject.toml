[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "hexo-frontend"
version = "0.1.0"
description = "Minimal browser UI for local Hexo tools."
requires-python = ">=3.11"
dependencies = [
  "hexo-engine==0.1.0",
  "hexo-runner==0.1.0",
]

[project.scripts]
hexo-play = "hexo_frontend.web:main"

[tool.hatch.build.targets.wheel]
packages = ["python/hexo_frontend"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
