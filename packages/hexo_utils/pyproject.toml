[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "hexo-utils"
version = "0.1.0"
description = "Shared game-record codec, symmetry, and state utilities for Hexo RL."
requires-python = ">=3.11"
dependencies = [
  "hexo-engine==0.1.0",
  "lz4>=4.3",
  "zstandard>=0.22",
]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[tool.maturin]
python-source = "python"
module-name = "hexo_utils._rust"
features = ["python"]
